<!<!DOCTYPE html>
<html>

<head>

<title>Register - Gram Shakti</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>

</head>

<body>

<h2>Register</h2>

<input type="text" id="name" placeholder="Name"><br><br>

<input type="text" id="mobile" placeholder="Mobile Number"><br><br>

<select id="type">

<option value="">Select Type</option>

<option value="worker">Worker</option>

<option value="customer">Customer</option>

<option value="business">Shop / Business / School</option>

</select>

<br><br>

<input type="text" id="work" placeholder="Work / Service">

<br><br>

<input type="text" id="city" placeholder="City / Village">

<br><br>

<button onclick="registerUser()">Register</button>

<script>

function registerUser(){

var name = document.getElementById("name").value;
var mobile = document.getElementById("mobile").value;
var type = document.getElementById("type").value;
var work = document.getElementById("work").value;
var city = document.getElementById("city").value;

var id = Date.now();

firebase.database().ref("users/"+id).set({

name:name,
mobile:mobile,
type:type,
work:work,
city:city

});

alert("Registration Successful");

if(type=="worker"){

window.location="worker.html";

}

if(type=="customer"){

window.location="customer.html";

}

if(type=="business"){

window.location="business.html";

}

}

</script>

</body>

</html>
