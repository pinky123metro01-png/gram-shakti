<!DOCTYPE html>
<html>

<head>

<title>Register - Gram Shakti</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>

</head>

<body>

<h1>Gram Shakti Register</h1>

<div class="container">

<input type="text" id="name" placeholder="Full Name">

<input type="number" id="mobile" placeholder="Mobile Number">

<select id="type">
<option value="">Select User Type</option>
<option value="customer">Customer</option>
<option value="worker">Worker</option>
<option value="company">Company / Business</option>
</select>

<input type="text" id="work" placeholder="Work Category (Driver, Plumber, Shop, etc)">

<input type="text" id="city" placeholder="City / Panchayat / Village">

<br><br>

<button onclick="registerUser()">Register</button>

<br><br>

<a href="login.html">
<button>Login</button>
</a>

</div>

</body>

</html>
